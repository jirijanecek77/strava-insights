services:
  frontend:
    build:
      context: ./frontend
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    env_file:
      - ./frontend/.env
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    env_file:
      - ./backend/.env
      - ./backend/.env.secrets
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      - postgres
      - redis

  worker:
    build:
      context: ./worker
    command: celery -A app.celery_app.celery_app worker --loglevel=info
    env_file:
      - ./worker/.env
      - ./worker/.env.secrets
    volumes:
      - ./worker:/app
    depends_on:
      - postgres
      - redis

  beat:
    build:
      context: ./worker
    command: celery -A app.celery_app.celery_app beat --loglevel=info
    env_file:
      - ./worker/.env
      - ./worker/.env.secrets
    volumes:
      - ./worker:/app
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: strava_insights
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
