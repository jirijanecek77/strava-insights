services:
  frontend:
    build:
      context: ./frontend
    command: npm run dev -- --host 0.0.0.0 --port 5173
    env_file:
      - .env
    environment:
      VITE_API_BASE_URL: http://backend:8000
      VITE_MAPYCZ_API_KEY: ${MAPY_CZ_API_KEY}
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/strava_insights
      REDIS_URL: redis://redis:6379/0
      SESSION_SECRET_KEY: change-me
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      - postgres
      - redis

  worker:
    build:
      context: ./worker
    command: celery -A app.celery_app.celery_app worker --loglevel=info
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/strava_insights
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./worker:/app
    depends_on:
      - postgres
      - redis

  beat:
    build:
      context: ./worker
    command: celery -A app.celery_app.celery_app beat --loglevel=info
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/strava_insights
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./worker:/app
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: strava_insights
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
